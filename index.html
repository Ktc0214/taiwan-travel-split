<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣旅遊花費分享 - 多人即時同步版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { font-family: 'Noto Sans TC', sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        .slide-in { animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .sync-indicator { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .delete-btn { opacity: 0; transition: opacity 0.2s; }
        .expense-item:hover .delete-btn { opacity: 1; }
        .progress-bar { transition: width 0.6s ease; }
        .float-animation { animation: float 6s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-20px); } }
        .tab-btn { position: relative; }
        .tab-btn::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: linear-gradient(90deg, #667eea, #764ba2); transform: scaleX(0); transition: transform 0.3s; }
        .tab-btn.active::after { transform: scaleX(1); }
        .person-tag { transition: all 0.2s; }
        .person-tag:hover { transform: scale(1.05); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <!-- 同步狀態指示器 -->
    <div id="syncStatus" class="fixed top-4 right-4 z-50 flex items-center gap-2 bg-white px-4 py-2 rounded-full shadow-lg border border-gray-200 text-sm">
        <div id="syncDot" class="w-2 h-2 rounded-full bg-green-500 sync-indicator"></div>
        <span id="syncText" class="text-gray-600">已連線</span>
    </div>

    <!-- Header -->
    <header class="gradient-bg text-white py-12 px-4 relative overflow-hidden">
        <div class="absolute inset-0 opacity-10">
            <div class="absolute top-0 left-0 w-96 h-96 bg-white rounded-full mix-blend-overlay filter blur-3xl transform -translate-x-1/2 -translate-y-1/2 float-animation"></div>
            <div class="absolute bottom-0 right-0 w-96 h-96 bg-white rounded-full mix-blend-overlay filter blur-3xl transform translate-x-1/2 translate-y-1/2 float-animation" style="animation-delay: 3s;"></div>
        </div>
        
        <div class="max-w-6xl mx-auto relative z-10 text-center">
            <div class="inline-flex items-center gap-2 bg-white/20 px-4 py-2 rounded-full mb-4 text-sm font-medium backdrop-blur-sm border border-white/30">
                <i class="fas fa-sync"></i>
                <span>即時同步版</span>
            </div>
            <h1 class="text-4xl md:text-6xl font-bold mb-4 tracking-tight">
                台灣旅遊花費分享
            </h1>
            <p class="text-xl text-white/90 max-w-2xl mx-auto">
                多人即時同步，和朋友一起記帳不再混亂
            </p>
            <div class="mt-6 flex justify-center gap-4 text-sm flex-wrap">
                <span class="flex items-center gap-2 bg-white/10 px-3 py-1 rounded-full"><i class="fas fa-bolt"></i> 即時同步</span>
                <span class="flex items-center gap-2 bg-white/10 px-3 py-1 rounded-full"><i class="fas fa-user-tag"></i> 標記付款人</span>
                <span class="flex items-center gap-2 bg-white/10 px-3 py-1 rounded-full"><i class="fas fa-hand-holding-usd"></i> 自動結算</span>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-6xl mx-auto px-4 py-8 -mt-8 relative z-20">
        <div class="grid lg:grid-cols-3 gap-6">
            <!-- Left Column: Input Form -->
            <div class="lg:col-span-1 space-y-6">
                <!-- Add Expense Card -->
                <div class="bg-white rounded-2xl shadow-xl p-6 card-hover border border-gray-100">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                        <i class="fas fa-plus-circle text-indigo-600"></i>
                        新增花費項目
                    </h2>
                    
                    <form id="expenseForm" class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">項目名稱</label>
                            <input type="text" id="itemName" placeholder="例如：台北101門票" 
                                class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all" required>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">金額 (NT$)</label>
                            <div class="relative">
                                <span class="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500 font-bold">NT$</span>
                                <input type="number" id="itemAmount" placeholder="0" min="0"
                                    class="w-full pl-12 pr-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all" required>
                            </div>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-3">分類</label>
                            <div class="grid grid-cols-3 gap-2">
                                <button type="button" class="category-btn flex flex-col items-center gap-1 p-2 rounded-lg border-2 border-gray-200 hover:border-indigo-500 hover:bg-indigo-50 transition-all text-xs font-medium text-gray-700" data-category="food">
                                    <span class="text-xl">🍜</span><span>美食</span>
                                </button>
                                <button type="button" class="category-btn flex flex-col items-center gap-1 p-2 rounded-lg border-2 border-gray-200 hover:border-blue-500 hover:bg-blue-50 transition-all text-xs font-medium text-gray-700" data-category="transport">
                                    <span class="text-xl">🚄</span><span>交通</span>
                                </button>
                                <button type="button" class="category-btn flex flex-col items-center gap-1 p-2 rounded-lg border-2 border-gray-200 hover:border-green-500 hover:bg-green-50 transition-all text-xs font-medium text-gray-700" data-category="hotel">
                                    <span class="text-xl">🏨</span><span>住宿</span>
                                </button>
                                <button type="button" class="category-btn flex flex-col items-center gap-1 p-2 rounded-lg border-2 border-gray-200 hover:border-purple-500 hover:bg-purple-50 transition-all text-xs font-medium text-gray-700" data-category="ticket">
                                    <span class="text-xl">🎫</span><span>門票</span>
                                </button>
                                <button type="button" class="category-btn flex flex-col items-center gap-1 p-2 rounded-lg border-2 border-gray-200 hover:border-pink-500 hover:bg-pink-50 transition-all text-xs font-medium text-gray-700" data-category="shopping">
                                    <span class="text-xl">🛍️</span><span>購物</span>
                                </button>
                                <button type="button" class="category-btn flex flex-col items-center gap-1 p-2 rounded-lg border-2 border-gray-200 hover:border-orange-500 hover:bg-orange-50 transition-all text-xs font-medium text-gray-700" data-category="other">
                                    <span class="text-xl">📦</span><span>其他</span>
                                </button>
                            </div>
                        </div>
                        
                        <input type="hidden" id="selectedCategory" value="food">
                        
                        <!-- 付款人選擇 -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-3">
                                <i class="fas fa-user-tag text-indigo-600 mr-1"></i>
                                誰付的錢？
                            </label>
                            <div id="payerSelector" class="flex flex-wrap gap-2 mb-3"></div>
                            <div class="flex gap-2">
                                <input type="text" id="newPersonName" placeholder="新增成員名稱" 
                                    class="flex-1 px-3 py-2 rounded-lg border border-gray-300 text-sm focus:ring-2 focus:ring-indigo-500">
                                <button type="button" onclick="addNewPerson()" 
                                    class="px-4 py-2 bg-gray-800 text-white rounded-lg text-sm font-medium hover:bg-gray-700 transition-colors">
                                    <i class="fas fa-user-plus"></i>
                                </button>
                            </div>
                            <input type="hidden" id="selectedPayer" value="">
                        </div>
                        
                        <!-- 分攤方式 -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-3">
                                <i class="fas fa-divide text-indigo-600 mr-1"></i>
                                分攤方式
                            </label>
                            <div class="space-y-2">
                                <label class="flex items-center gap-3 p-3 rounded-lg border-2 border-indigo-500 bg-indigo-50 cursor-pointer" id="splitEqualLabel">
                                    <input type="radio" name="splitType" value="equal" checked class="w-4 h-4 text-indigo-600" onchange="updateSplitType()">
                                    <div class="flex-1">
                                        <div class="font-medium text-gray-800">平均分摊</div>
                                        <div class="text-xs text-gray-500">所有成員平分這筆費用</div>
                                    </div>
                                    <i class="fas fa-equals text-indigo-600"></i>
                                </label>
                                <label class="flex items-center gap-3 p-3 rounded-lg border-2 border-gray-200 hover:border-gray-300 cursor-pointer" id="splitCustomLabel">
                                    <input type="radio" name="splitType" value="custom" class="w-4 h-4 text-indigo-600" onchange="updateSplitType()">
                                    <div class="flex-1">
                                        <div class="font-medium text-gray-800">自訂分攤</div>
                                        <div class="text-xs text-gray-500">指定特定成員分攤</div>
                                    </div>
                                    <i class="fas fa-sliders-h text-gray-400"></i>
                                </label>
                            </div>
                            
                            <div id="customSplitContainer" class="hidden mt-3 p-3 bg-gray-50 rounded-lg">
                                <p class="text-xs text-gray-500 mb-2">選擇要分攤的成員：</p>
                                <div id="splitMembersSelector" class="flex flex-wrap gap-2"></div>
                            </div>
                        </div>
                        
                        <button type="submit" 
                            class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-4 rounded-lg hover:shadow-lg transform hover:scale-[1.02] transition-all flex items-center justify-center gap-2 shadow-md">
                            <i class="fas fa-plus"></i>
                            新增項目
                        </button>
                    </form>
                </div>
                
                <!-- 成員列表（新加入的區塊） -->
                <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-bold text-gray-800 flex items-center gap-2">
                            <i class="fas fa-users text-indigo-600"></i>
                            成員列表
                        </h3>
                        <span id="memberCount" class="text-xs bg-indigo-100 text-indigo-700 px-2 py-1 rounded-full">0 人</span>
                    </div>
                    <div id="membersList" class="space-y-2">
                        <!-- 動態生成成員列表 -->
                    </div>
                </div>
                
                <!-- Trip Code -->
                <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100">
                    <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                        <i class="fas fa-key text-indigo-600"></i>
                        旅程代碼
                    </h3>
                    <div class="flex gap-2 mb-3">
                        <input type="text" id="tripCode" value="default" 
                            class="flex-1 px-3 py-2 rounded-lg border border-gray-300 text-sm font-mono bg-gray-50" readonly>
                        <button onclick="generateNewTrip()" 
                            class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-700">
                            新建旅程
                        </button>
                    </div>
                    <p class="text-xs text-gray-500">
                        將此網址分享給朋友，即可共同編輯同一個帳本
                    </p>
                </div>
            </div>

            <!-- Right Column: Expense List & Summary -->
            <div class="lg:col-span-2 space-y-6">
                <!-- Tabs -->
                <div class="bg-white rounded-2xl shadow-lg p-2 flex gap-1 border border-gray-100">
                    <button onclick="switchTab('expenses')" id="tab-expenses" class="tab-btn active flex-1 py-3 px-4 rounded-xl font-medium text-gray-700 hover:bg-gray-50 transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-list-ul"></i>
                        花費明細
                    </button>
                    <button onclick="switchTab('settlement')" id="tab-settlement" class="tab-btn flex-1 py-3 px-4 rounded-xl font-medium text-gray-700 hover:bg-gray-50 transition-all flex items-center justify-center gap-2">
                        <i class="fas fa-hand-holding-usd"></i>
                        結算明細
                    </button>
                </div>

                <!-- Total Summary Card -->
                <div class="bg-white rounded-2xl shadow-xl p-8 text-center relative overflow-hidden border border-gray-100">
                    <div class="absolute top-0 left-0 w-full h-2 gradient-bg"></div>
                    <p class="text-gray-600 mb-2 font-medium">總花費金額</p>
                    <div class="flex items-baseline justify-center gap-2">
                        <span class="text-3xl font-bold text-gray-400">NT$</span>
                        <span id="totalAmount" class="text-6xl font-bold text-gray-800 tracking-tight">0</span>
                    </div>
                    <div class="mt-6 flex justify-center gap-4">
                        <button onclick="resetAll()" class="px-6 py-2 text-red-600 hover:bg-red-50 rounded-lg transition-colors font-medium border border-red-200">
                            <i class="fas fa-trash-alt mr-2"></i>清空
                        </button>
                        <button onclick="shareResult()" class="px-6 py-2 bg-indigo-600 text-white hover:bg-indigo-700 rounded-lg transition-colors font-medium shadow-lg flex items-center">
                            <i class="fas fa-share-alt mr-2"></i>分享結果
                        </button>
                    </div>
                </div>

                <!-- Expenses Tab Content -->
                <div id="content-expenses" class="space-y-6">
                    <div class="bg-white rounded-2xl shadow-lg p-6 min-h-[400px] border border-gray-100">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                                <i class="fas fa-receipt text-indigo-600"></i>
                                花費明細
                            </h2>
                            <span id="itemCount" class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-sm font-medium">0 個項目</span>
                        </div>
                        
                        <div id="expenseList" class="space-y-3">
                            <div id="emptyState" class="text-center py-16 text-gray-400">
                                <div class="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <i class="fas fa-receipt text-4xl opacity-30"></i>
                                </div>
                                <p class="text-lg font-medium">尚無花費項目</p>
                                <p class="text-sm mt-2 text-gray-400">在左側新增您的第一筆花費</p>
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100">
                        <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                            <i class="fas fa-chart-pie text-indigo-600"></i>
                            分類統計
                        </h3>
                        <div class="space-y-3" id="categoryStats">
                            <p class="text-gray-400 text-sm text-center py-4">尚無資料</p>
                        </div>
                    </div>
                </div>

                <!-- Settlement Tab Content -->
                <div id="content-settlement" class="hidden space-y-6">
                    <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100">
                        <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                            <i class="fas fa-user-friends text-indigo-600"></i>
                            個人支出統計
                        </h3>
                        <div id="personalStats" class="grid md:grid-cols-2 gap-4"></div>
                    </div>

                    <div class="bg-white rounded-2xl shadow-lg p-6 border border-gray-100">
                        <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2">
                            <i class="fas fa-exchange-alt text-indigo-600"></i>
                            結算建議
                        </h3>
                        <div id="settlementDetails" class="space-y-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Share Modal -->
    <div id="shareModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 backdrop-blur-sm">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full mx-4 shadow-2xl max-h-[90vh] overflow-y-auto">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-share-alt text-2xl text-indigo-600"></i>
                </div>
                <h3 class="text-2xl font-bold text-gray-800">分享您的花費</h3>
            </div>
            
            <div class="bg-gray-50 p-4 rounded-lg mb-6 font-mono text-sm text-gray-700 break-all border border-gray-200 max-h-64 overflow-y-auto" id="shareContent"></div>
            
            <div class="flex gap-3">
                <button onclick="copyToClipboard()" class="flex-1 bg-indigo-600 text-white py-3 rounded-lg font-medium hover:bg-indigo-700 transition-colors flex items-center justify-center gap-2">
                    <i class="fas fa-copy"></i>
                    <span id="copyBtnText">複製文字</span>
                </button>
                <button onclick="closeModal()" class="flex-1 bg-gray-200 text-gray-700 py-3 rounded-lg font-medium hover:bg-gray-300 transition-colors">
                    關閉
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full shadow-lg opacity-0 transition-opacity duration-300 pointer-events-none z-50 flex items-center gap-2">
        <i class="fas fa-check-circle text-green-400"></i>
        <span id="toastMessage">已複製到剪貼簿</span>
    </div>

    <script>
        // Firebase 設定 - 請將 YOUR_DATABASE_URL 替換為您的資料庫網址
        const firebaseConfig = {
            databaseURL: "https://taiwan-travel-split-default-rtdb.asia-southeast1.firebasedatabase.app/"
        };
        
        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        // 取得旅程代碼（從網址參數或預設）
        const urlParams = new URLSearchParams(window.location.search);
        let tripCode = urlParams.get('trip') || 'default';
        document.getElementById('tripCode').value = tripCode;
        
        // 資料參考
        const tripRef = database.ref('trips/' + tripCode);
        const expensesRef = tripRef.child('expenses');
        const membersRef = tripRef.child('members');
        
        // 狀態
        let expenses = [];
        let members = ['我', '朋友A', '朋友B'];
        let currentTab = 'expenses';
        
        const categoryConfig = {
            food: { icon: '🍜', name: '美食', color: 'bg-orange-100 text-orange-700 border-orange-200', barColor: 'bg-orange-500' },
            transport: { icon: '🚄', name: '交通', color: 'bg-blue-100 text-blue-700 border-blue-200', barColor: 'bg-blue-500' },
            hotel: { icon: '🏨', name: '住宿', color: 'bg-green-100 text-green-700 border-green-200', barColor: 'bg-green-500' },
            ticket: { icon: '🎫', name: '門票', color: 'bg-purple-100 text-purple-700 border-purple-200', barColor: 'bg-purple-500' },
            shopping: { icon: '🛍️', name: '購物', color: 'bg-pink-100 text-pink-700 border-pink-200', barColor: 'bg-pink-500' },
            other: { icon: '📦', name: '其他', color: 'bg-gray-100 text-gray-700 border-gray-200', barColor: 'bg-gray-500' }
        };
        
        const personColors = ['bg-red-500', 'bg-blue-500', 'bg-green-500', 'bg-yellow-500', 'bg-purple-500', 'bg-pink-500', 'bg-indigo-500', 'bg-teal-500'];

        // 監聽資料變化（即時同步）
        expensesRef.on('value', (snapshot) => {
            const data = snapshot.val();
            expenses = data ? Object.values(data) : [];
            renderExpenses();
            updateStats();
            updateSyncStatus(true);
        });
        
        membersRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                members = data;
                renderMembers();
                updatePayerSelector();
                updateSplitMembersSelector();
            }
        });

        function updateSyncStatus(connected) {
            const dot = document.getElementById('syncDot');
            const text = document.getElementById('syncText');
            if (connected) {
                dot.className = 'w-2 h-2 rounded-full bg-green-500 sync-indicator';
                text.textContent = '即時同步中';
            } else {
                dot.className = 'w-2 h-2 rounded-full bg-red-500';
                text.textContent = '離線';
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            // 初始化成員
            membersRef.once('value', (snapshot) => {
                if (!snapshot.val()) {
                    membersRef.set(members);
                }
            });
            
            // 類別選擇
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.category-btn').forEach(b => {
                        b.classList.remove('ring-2', 'ring-offset-2', 'ring-indigo-500', 'border-indigo-500');
                    });
                    this.classList.add('ring-2', 'ring-offset-2', 'ring-indigo-500', 'border-indigo-500');
                    document.getElementById('selectedCategory').value = this.dataset.category;
                });
            });
            document.querySelector('.category-btn').click();
            
            // 表單提交
            document.getElementById('expenseForm').addEventListener('submit', (e) => {
                e.preventDefault();
                addExpense();
            });
        });

        function generateNewTrip() {
            const newCode = 'trip-' + Math.random().toString(36).substring(2, 8);
            window.location.href = window.location.pathname + '?trip=' + newCode;
        }

        function addNewPerson() {
            const input = document.getElementById('newPersonName');
            const name = input.value.trim();
            if (!name || members.includes(name)) {
                showToast(name ? '此成員已存在' : '請輸入成員名稱');
                return;
            }
            members.push(name);
            membersRef.set(members);
            input.value = '';
            showToast(`已新增成員：${name}`);
        }

        function removePerson(index) {
            if (members.length <= 1) {
                showToast('至少需要保留一位成員');
                return;
            }
            const name = members[index];
            members.splice(index, 1);
            membersRef.set(members);
            showToast(`已移除成員：${name}`);
        }

        function renderMembers() {
            const container = document.getElementById('membersList');
            const count = document.getElementById('memberCount');
            
            count.textContent = `${members.length} 人`;
            
            container.innerHTML = members.map((member, index) => `
                <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 ${personColors[index % personColors.length]} rounded-full flex items-center justify-center text-white text-xs font-bold">
                            ${member.charAt(0)}
                        </div>
                        <span class="font-medium text-gray-800">${member}</span>
                    </div>
                    ${members.length > 1 ? `
                        <button onclick="removePerson(${index})" class="w-8 h-8 flex items-center justify-center text-gray-400 hover:text-red-500 hover:bg-red-50 rounded-full transition-all">
                            <i class="fas fa-times"></i>
                        </button>
                    ` : ''}
                </div>
            `).join('');
        }

        function updatePayerSelector() {
            const container = document.getElementById('payerSelector');
            const selectedPayer = document.getElementById('selectedPayer');
            if (!selectedPayer.value || !members.includes(selectedPayer.value)) {
                selectedPayer.value = members[0];
            }
            
            container.innerHTML = members.map((member, index) => `
                <button type="button" onclick="selectPayer('${member}')" 
                    class="person-tag px-4 py-2 rounded-full text-sm font-medium transition-all flex items-center gap-2 ${selectedPayer.value === member ? 'bg-indigo-600 text-white shadow-md' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}">
                    <div class="w-5 h-5 ${personColors[index % personColors.length]} rounded-full flex items-center justify-center text-white text-xs">${member.charAt(0)}</div>
                    ${member}
                </button>
            `).join('');
        }

        function selectPayer(person) {
            document.getElementById('selectedPayer').value = person;
            updatePayerSelector();
        }

        function updateSplitMembersSelector() {
            const container = document.getElementById('splitMembersSelector');
            container.innerHTML = members.map((member, index) => `
                <label class="flex items-center gap-2 cursor-pointer">
                    <input type="checkbox" name="splitMember" value="${member}" checked class="w-4 h-4 text-indigo-600 rounded border-gray-300 focus:ring-indigo-500">
                    <div class="flex items-center gap-1">
                        <div class="w-5 h-5 ${personColors[index % personColors.length]} rounded-full flex items-center justify-center text-white text-xs">${member.charAt(0)}</div>
                        <span class="text-sm text-gray-700">${member}</span>
                    </div>
                </label>
            `).join('');
        }

        function updateSplitType() {
            const isCustom = document.querySelector('input[name="splitType"]:checked').value === 'custom';
            document.getElementById('customSplitContainer').classList.toggle('hidden', !isCustom);
            
            const equalLabel = document.getElementById('splitEqualLabel');
            const customLabel = document.getElementById('splitCustomLabel');
            
            if (isCustom) {
                equalLabel.classList.remove('border-indigo-500', 'bg-indigo-50');
                equalLabel.classList.add('border-gray-200');
                customLabel.classList.add('border-indigo-500', 'bg-indigo-50');
                customLabel.classList.remove('border-gray-200');
            } else {
                equalLabel.classList.add('border-indigo-500', 'bg-indigo-50');
                equalLabel.classList.remove('border-gray-200');
                customLabel.classList.remove('border-indigo-500', 'bg-indigo-50');
                customLabel.classList.add('border-gray-200');
            }
        }

        function addExpense() {
            const name = document.getElementById('itemName').value.trim();
            const amount = parseInt(document.getElementById('itemAmount').value);
            const category = document.getElementById('selectedCategory').value;
            const payer = document.getElementById('selectedPayer').value;
            const splitType = document.querySelector('input[name="splitType"]:checked').value;
            
            if (!name || !amount || amount <= 0) return;
            
            let splitMembers;
            if (splitType === 'equal') {
                splitMembers = [...members];
            } else {
                const checked = document.querySelectorAll('input[name="splitMember"]:checked');
                splitMembers = Array.from(checked).map(cb => cb.value);
                if (splitMembers.length === 0) {
                    showToast('請至少選擇一位分攤成員');
                    return;
                }
            }

            const expense = {
                id: Date.now(),
                name,
                amount,
                category,
                payer,
                splitMembers,
                date: new Date().toLocaleDateString('zh-TW')
            };

            // 儲存到 Firebase（會自動同步給所有人）
            const newExpenseRef = expensesRef.child(expense.id);
            newExpenseRef.set(expense);
            
            // 重置表單
            document.getElementById('itemName').value = '';
            document.getElementById('itemAmount').value = '';
            document.getElementById('itemName').focus();
            
            showToast('已新增項目');
        }

        function deleteExpense(id) {
            if (confirm('確定要刪除此項目嗎？')) {
                expensesRef.child(id).remove();
                showToast('已刪除項目');
            }
        }

        function renderExpenses() {
            const list = document.getElementById('expenseList');
            const emptyState = document.getElementById('emptyState');
            const count = document.getElementById('itemCount');
            
            count.textContent = `${expenses.length} 個項目`;

            if (expenses.length === 0) {
                list.innerHTML = '';
                list.appendChild(emptyState);
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';
            list.innerHTML = '';
            list.appendChild(emptyState);

            [...expenses].reverse().forEach((expense, index) => {
                const config = categoryConfig[expense.category];
                const payerIndex = members.indexOf(expense.payer);
                const splitCount = expense.splitMembers.length;
                const splitAmount = Math.round(expense.amount / splitCount);
                
                const div = document.createElement('div');
                div.className = 'expense-item slide-in bg-white border border-gray-200 rounded-xl p-4 hover:shadow-md transition-all';
                div.style.animationDelay = `${index * 0.05}s`;
                
                div.innerHTML = `
                    <div class="flex items-start justify-between mb-3">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 ${config.color} rounded-full flex items-center justify-center text-xl border-2 shadow-sm">${config.icon}</div>
                            <div>
                                <h4 class="font-bold text-gray-800 text-lg">${escapeHtml(expense.name)}</h4>
                                <div class="flex items-center gap-2 text-sm text-gray-500">
                                    <span class="px-2 py-0.5 rounded-full text-xs font-medium ${config.color}">${config.name}</span>
                                    <span>${expense.date}</span>
                                </div>
                            </div>
                        </div>
                        <div class="text-right">
                            <div class="text-2xl font-bold text-gray-800">NT$ ${expense.amount.toLocaleString()}</div>
                            <div class="text-xs text-gray-500">每人約 NT$ ${splitAmount.toLocaleString()}</div>
                        </div>
                    </div>
                    <div class="flex items-center justify-between pt-3 border-t border-gray-100">
                        <div class="flex items-center gap-3">
                            <div class="flex items-center gap-2">
                                <span class="text-xs text-gray-500">付款人：</span>
                                <div class="flex items-center gap-1 px-2 py-1 bg-gray-100 rounded-full">
                                    <div class="w-4 h-4 ${personColors[payerIndex % personColors.length]} rounded-full flex items-center justify-center text-white text-xs">${expense.payer.charAt(0)}</div>
                                    <span class="text-sm font-medium text-gray-700">${expense.payer}</span>
                                </div>
                            </div>
                            <div class="flex items-center gap-2">
                                <span class="text-xs text-gray-500">分攤：</span>
                                <div class="flex -space-x-1">
                                    ${expense.splitMembers.map(m => {
                                        const idx = members.indexOf(m);
                                        return `<div class="w-5 h-5 ${personColors[idx % personColors.length]} rounded-full flex items-center justify-center text-white text-xs border-2 border-white" title="${m}">${m.charAt(0)}</div>`;
                                    }).join('')}
                                </div>
                                <span class="text-xs text-gray-500">(${splitCount}人)</span>
                            </div>
                        </div>
                        <button onclick="deleteExpense(${expense.id})" class="delete-btn p-2 text-red-500 hover:bg-red-50 rounded-lg transition-colors">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                `;
                
                list.appendChild(div);
            });
        }

        function updateStats() {
            const total = expenses.reduce((sum, e) => sum + e.amount, 0);
            const categoryTotals = {};
            expenses.forEach(e => {
                categoryTotals[e.category] = (categoryTotals[e.category] || 0) + e.amount;
            });

            animateNumber(document.getElementById('totalAmount'), total);

            const statsContainer = document.getElementById('categoryStats');
            if (expenses.length === 0) {
                statsContainer.innerHTML = '<p class="text-gray-400 text-sm text-center py-4">尚無資料</p>';
                return;
            }
            
            statsContainer.innerHTML = '';
            Object.entries(categoryTotals)
                .sort((a, b) => b[1] - a[1])
                .forEach(([cat, amount]) => {
                    const config = categoryConfig[cat];
                    const percentage = total > 0 ? (amount / total * 100).toFixed(1) : 0;
                    const div = document.createElement('div');
                    div.className = 'fade-in';
                    div.innerHTML = `
                        <div class="flex justify-between items-center mb-1">
                            <div class="flex items-center gap-2"><span>${config.icon}</span><span class="font-medium text-gray-700">${config.name}</span></div>
                            <span class="font-bold text-gray-800">NT$ ${amount.toLocaleString()}</span>
                        </div>
                        <div class="w-full bg-gray-200 rounded-full h-2 overflow-hidden"><div class="${config.barColor} h-2 rounded-full progress-bar" style="width: ${percentage}%"></div></div>
                        <div class="text-right text-xs text-gray-500 mt-1">${percentage}%</div>
                    `;
                    statsContainer.appendChild(div);
                });
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.getElementById('content-expenses').classList.add('hidden');
            document.getElementById('content-settlement').classList.add('hidden');
            document.getElementById(`content-${tab}`).classList.remove('hidden');
            if (tab === 'settlement') updateSettlement();
        }

        function updateSettlement() {
            if (expenses.length === 0) {
                document.getElementById('personalStats').innerHTML = '<p class="text-gray-400 text-sm text-center py-4 col-span-2">尚無資料</p>';
                document.getElementById('settlementDetails').innerHTML = '<p class="text-gray-400 text-sm text-center py-4">尚無資料</p>';
                return;
            }

            const balances = {};
            members.forEach(m => balances[m] = 0);
            
            expenses.forEach(expense => {
                const splitAmount = expense.amount / expense.splitMembers.length;
                balances[expense.payer] += expense.amount;
                expense.splitMembers.forEach(member => {
                    balances[member] -= splitAmount;
                });
            });

            const personalStatsContainer = document.getElementById('personalStats');
            personalStatsContainer.innerHTML = members.map((member, index) => {
                const paid = expenses.filter(e => e.payer === member).reduce((sum, e) => sum + e.amount, 0);
                const shouldPay = expenses.reduce((sum, e) => {
                    if (e.splitMembers.includes(member)) return sum + (e.amount / e.splitMembers.length);
                    return sum;
                }, 0);
                const balance = paid - shouldPay;
                const isPositive = balance >= 0;
                
                return `
                    <div class="bg-gray-50 rounded-xl p-4 border-2 ${isPositive ? 'border-green-200' : 'border-red-200'}">
                        <div class="flex items-center gap-3 mb-3">
                            <div class="w-10 h-10 ${personColors[index % personColors.length]} rounded-full flex items-center justify-center text-white font-bold">${member.charAt(0)}</div>
                            <div>
                                <div class="font-bold text-gray-800">${member}</div>
                                <div class="text-xs text-gray-500">${isPositive ? '應收款' : '應付款'}</div>
                            </div>
                        </div>
                        <div class="space-y-1 text-sm">
                            <div class="flex justify-between"><span class="text-gray-600">已支付：</span><span class="font-medium">NT$ ${paid.toLocaleString()}</span></div>
                            <div class="flex justify-between"><span class="text-gray-600">應分攤：</span><span class="font-medium">NT$ ${shouldPay.toLocaleString()}</span></div>
                            <div class="flex justify-between pt-2 border-t border-gray-200 mt-2">
                                <span class="font-bold ${isPositive ? 'text-green-600' : 'text-red-600'}">${isPositive ? '應收回' : '應支付'}：</span>
                                <span class="font-bold ${isPositive ? 'text-green-600' : 'text-red-600'}">NT$ ${Math.abs(balance).toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');

            const settlementContainer = document.getElementById('settlementDetails');
            const debtors = [];
            const creditors = [];
            
            Object.entries(balances).forEach(([person, balance]) => {
                if (balance < -0.01) debtors.push({ person, amount: -balance });
                else if (balance > 0.01) creditors.push({ person, amount: balance });
            });
            
            debtors.sort((a, b) => b.amount - a.amount);
            creditors.sort((a, b) => b.amount - a.amount);
            
            let transactions = [];
            let debtorIdx = 0, creditorIdx = 0;
            
            while (debtorIdx < debtors.length && creditorIdx < creditors.length) {
                const debtor = debtors[debtorIdx];
                const creditor = creditors[creditorIdx];
                const amount = Math.min(debtor.amount, creditor.amount);
                if (amount > 0.01) {
                    transactions.push({ from: debtor.person, to: creditor.person, amount: Math.round(amount) });
                }
                debtor.amount -= amount;
                creditor.amount -= amount;
                if (debtor.amount < 0.01) debtorIdx++;
                if (creditor.amount < 0.01) creditorIdx++;
            }
            
            if (transactions.length === 0) {
                settlementContainer.innerHTML = `
                    <div class="text-center py-8 bg-green-50 rounded-xl border border-green-200">
                        <i class="fas fa-check-circle text-4xl text-green-500 mb-2"></i>
                        <p class="text-green-800 font-medium">帳目已平衡！無需額外轉帳</p>
                    </div>
                `;
            } else {
                settlementContainer.innerHTML = transactions.map((t, i) => {
                    const fromIdx = members.indexOf(t.from);
                    const toIdx = members.indexOf(t.to);
                    return `
                        <div class="flex items-center justify-between p-4 bg-white border border-gray-200 rounded-xl slide-in" style="animation-delay: ${i * 0.1}s">
                            <div class="flex items-center gap-3">
                                <div class="flex items-center gap-2">
                                    <div class="w-8 h-8 ${personColors[fromIdx % personColors.length]} rounded-full flex items-center justify-center text-white text-sm font-bold">${t.from.charAt(0)}</div>
                                    <span class="font-medium text-gray-800">${t.from}</span>
                                </div>
                                <i class="fas fa-arrow-right text-gray-400"></i>
                                <div class="flex items-center gap-2">
                                    <div class="w-8 h-8 ${personColors[toIdx % personColors.length]} rounded-full flex items-center justify-center text-white text-sm font-bold">${t.to.charAt(0)}</div>
                                    <span class="font-medium text-gray-800">${t.to}</span>
                                </div>
                            </div>
                            <div class="text-right">
                                <div class="text-xl font-bold text-red-600">NT$ ${t.amount.toLocaleString()}</div>
                                <div class="text-xs text-gray-500">建議轉帳金額</div>
                            </div>
                        </div>
                    `;
                }).join('');
            }
        }

        function animateNumber(element, target) {
            const current = parseInt(element.textContent.replace(/,/g, '')) || 0;
            const diff = target - current;
            const duration = 500;
            const startTime = performance.now();
            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                const value = Math.floor(current + diff * easeProgress);
                element.textContent = value.toLocaleString();
                if (progress < 1) requestAnimationFrame(update);
            }
            requestAnimationFrame(update);
        }

        function resetAll() {
            if (expenses.length === 0) return;
            if (confirm('確定要清空所有花費項目嗎？此動作無法復原。')) {
                expensesRef.remove();
                showToast('已清空所有項目');
            }
        }

        function shareResult() {
            if (expenses.length === 0) {
                showToast('請先新增花費項目');
                return;
            }
            const total = expenses.reduce((sum, e) => sum + e.amount, 0);
            const balances = {};
            members.forEach(m => balances[m] = 0);
            expenses.forEach(expense => {
                const splitAmount = expense.amount / expense.splitMembers.length;
                balances[expense.payer] += expense.amount;
                expense.splitMembers.forEach(member => { balances[member] -= splitAmount; });
            });

            let shareText = `🌟 台灣旅遊花費結算\n💰 總計：NT$ ${total.toLocaleString()}\n👥 成員：${members.join('、')}\n\n📊 個人收支：\n`;
            members.forEach((member, i) => {
                const paid = expenses.filter(e => e.payer === member).reduce((sum, e) => sum + e.amount, 0);
                const shouldPay = expenses.reduce((sum, e) => { if (e.splitMembers.includes(member)) return sum + (e.amount / e.splitMembers.length); return sum; }, 0);
                const balance = paid - shouldPay;
                shareText += `${['🔴','🔵','🟢','🟡','🟣'][i % 5]} ${member}：${balance >= 0 ? '應收' : '應付'} NT$ ${Math.abs(Math.round(balance)).toLocaleString()}\n`;
            });
            shareText += `\n📝 詳細項目：\n`;
            expenses.forEach(e => {
                const config = categoryConfig[e.category];
                shareText += `${config.icon} ${e.name} NT$${e.amount.toLocaleString()}（${e.payer}付，${e.splitMembers.length}人分攤）\n`;
            });
            shareText += `\n🔗 ${window.location.href}`;

            document.getElementById('shareContent').textContent = shareText;
            document.getElementById('shareModal').classList.remove('hidden');
            document.getElementById('shareModal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('shareModal').classList.add('hidden');
            document.getElementById('shareModal').classList.remove('flex');
        }

        function copyToClipboard() {
            const content = document.getElementById('shareContent').textContent;
            navigator.clipboard.writeText(content).then(() => {
                document.getElementById('copyBtnText').textContent = '已複製！';
                setTimeout(() => { document.getElementById('copyBtnText').textContent = '複製文字'; }, 2000);
                showToast('已複製到剪貼簿');
            });
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.remove('opacity-0');
            setTimeout(() => { toast.classList.add('opacity-0'); }, 2000);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 離線檢測
        window.addEventListener('offline', () => updateSyncStatus(false));
        window.addEventListener('online', () => updateSyncStatus(true));
    </script>
</body>
</html>
